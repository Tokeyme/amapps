<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AM Apps — Apps for iOS &amp; Android</title>
  <meta name="description" content="Apps for iOS and Android by Andreas Maier." />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="./" aria-label="AM Apps — Home">
      <img class="logo" src="assets/am-logo.png" alt="" width="291" height="170" />
      <span class="brand-name">Apps</span>
    </a>

    <div class="lang-switch" role="group" aria-label="Language / Sprache">
      <button type="button" data-lang="en">EN</button>
      <button type="button" data-lang="de">DE</button>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1 data-i18n="hero_tagline">Apps for iOS &amp; Android</h1>
      <p class="hero-sub" data-i18n="hero_sub"></p>
      <p class="hero-by" data-i18n="hero_by"></p>
    </section>

    <section class="apps" aria-labelledby="apps-heading">
      <h2 id="apps-heading" data-i18n="apps_heading">The apps</h2>

      <div class="grid">
        <!-- Converter / Umrechner -->
        <article class="card">
          <img class="icon" src="assets/converter.png" alt="" width="60" height="60" />
          <div class="card-body">
            <h3 data-i18n="app_converter_name">Converter AM</h3>
            <p data-i18n="app_converter_desc"></p>
            <div class="platforms">
              <span class="pill">iOS</span>
            </div>
            <div class="stores">
              <a class="store" href="https://apps.apple.com/app/id1450259074" target="_blank" rel="noopener" data-i18n="btn_appstore">App Store</a>
            </div>
          </div>
        </article>

        <!-- Podcast AM -->
        <article class="card">
          <img class="icon" src="assets/podcast.png" alt="" width="60" height="60" />
          <div class="card-body">
            <h3 data-i18n="app_podcast_name">Podcast AM</h3>
            <p data-i18n="app_podcast_desc"></p>
            <div class="platforms">
              <span class="pill">iOS</span>
              <span class="pill">Android</span>
            </div>
            <div class="stores">
              <a class="store" href="https://apps.apple.com/app/id1604019625" target="_blank" rel="noopener" data-i18n="btn_appstore">App Store</a>
              <a class="store" href="https://play.google.com/store/apps/details?id=com.podcastam.podcast_am" target="_blank" rel="noopener" data-i18n="btn_googleplay">Google Play</a>
            </div>
          </div>
        </article>

        <!-- Feste — German page only -->
        <article class="card" data-only="de">
          <img class="icon" src="assets/feste.png" alt="" width="60" height="60" />
          <div class="card-body">
            <h3 data-i18n="app_feste_name">Fest AM</h3>
            <p data-i18n="app_feste_desc"></p>
            <div class="platforms">
              <span class="pill">iOS</span>
              <span class="pill">Android</span>
            </div>
            <div class="stores">
              <a class="store" href="https://apps.apple.com/app/id6781781563" target="_blank" rel="noopener" data-i18n="btn_appstore">App Store</a>
              <a class="store" href="https://play.google.com/store/apps/details?id=com.festivalsam.app" target="_blank" rel="noopener" data-i18n="btn_googleplay">Google Play</a>
              <a class="store" href="https://feste.amapps.app" target="_blank" rel="noopener" data-i18n="btn_web">Im Browser</a>
            </div>
          </div>
        </article>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p class="footer-made" data-i18n="footer_made"></p>
    <nav class="footer-links">
      <a href="impressum.html" data-i18n="footer_imprint">Impressum</a>
      <span aria-hidden="true">·</span>
      <a href="datenschutz.html" data-i18n="footer_privacy">Datenschutz</a>
    </nav>
    <p class="copy">© 2026 Andreas Maier</p>
  </footer>

  <script src="app.js"></script>
  <!-- Cloudflare Web Analytics (cookieless) -->
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "127ba999be8e488f868aa8134bfeface"}'></script>
</body>
</html>
